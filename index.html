<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0A0B0D" />
<title>Hybrid Greek Runner</title>
<style>
  /* ============ DESIGN TOKENS ============ */
  :root{
    --bg:#08090B;
    --bg-2:#0E1013;
    --glass:rgba(255,255,255,0.045);
    --glass-2:rgba(255,255,255,0.07);
    --glass-brd:rgba(255,255,255,0.09);
    --glass-brd-strong:rgba(255,255,255,0.16);
    --text:#F4F4F6;
    --text-2:#B7BCC5;
    --muted:#7C818C;
    --faint:#565B66;
    --gold:#E4C078;
    --gold-2:#C79B4E;
    --gold-glow:rgba(228,192,120,0.22);
    --cyan:#5FC6F5;
    --cyan-glow:rgba(95,198,245,0.18);
    --green:#3ED47A;
    --red:#FF5A4E;
    --amber:#FFB020;
    --violet:#A489F0;
    --radius:22px;
    --radius-sm:15px;
    --ease:cubic-bezier(.32,.72,0,1);
    --sat:env(safe-area-inset-top);
    --sab:env(safe-area-inset-bottom);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",system-ui,"Segoe UI",Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
    letter-spacing:-0.01em;
  }
  /* ambient background glows */
  body::before{
    content:"";position:fixed;inset:0;z-index:-2;
    background:
      radial-gradient(58% 42% at 82% -6%, var(--gold-glow), transparent 62%),
      radial-gradient(52% 40% at 8% 8%, var(--cyan-glow), transparent 60%),
      radial-gradient(70% 50% at 50% 108%, rgba(164,137,240,0.10), transparent 60%),
      linear-gradient(180deg,#0B0D10 0%, #08090B 42%, #060708 100%);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size:3px 3px;opacity:.6;
  }
  ::selection{background:var(--gold);color:#111;}
  input,button,textarea,select{font-family:inherit;color:inherit;}
  button{cursor:pointer;background:none;border:none;}
  ::-webkit-scrollbar{display:none;}

  /* ============ LAYOUT ============ */
  #app{
    max-width:520px;margin:0 auto;min-height:100vh;
    padding:calc(var(--sat) + 8px) 18px calc(96px + var(--sab)) 18px;
  }
  .view{animation:viewIn .5s var(--ease) both;}
  @keyframes viewIn{from{opacity:0;transform:translateY(10px) scale(.99);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* ============ TOP BAR ============ */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:6px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .laurel{width:26px;height:26px;flex:none;color:var(--gold);filter:drop-shadow(0 0 8px var(--gold-glow));}
  .brand-txt{line-height:1;}
  .brand-txt .k{font-size:9px;letter-spacing:.32em;color:var(--muted);text-transform:uppercase;font-weight:600;display:block;margin-bottom:3px;}
  .brand-txt .n{font-size:15px;font-weight:700;letter-spacing:.02em;background:linear-gradient(92deg,#fff,var(--gold) 130%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#161105;font-size:15px;box-shadow:0 4px 14px var(--gold-glow);}

  /* ============ GLASS CARD ============ */
  .card{
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(150%);
    -webkit-backdrop-filter:blur(24px) saturate(150%);
    border:1px solid var(--glass-brd);
    border-radius:var(--radius);
    padding:18px;
    position:relative;
    overflow:hidden;
  }
  .card::before{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(160deg,rgba(255,255,255,.05),transparent 42%);pointer-events:none;}
  .card + .card{margin-top:14px;}

  /* headers */
  .eyebrow{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:26px 2px 12px;}
  .sec-head h2{font-size:20px;font-weight:700;letter-spacing:-.02em;}
  .sec-head .link{font-size:12.5px;color:var(--gold);font-weight:600;}

  /* ============ HERO (today) ============ */
  .hero{
    background:
      radial-gradient(120% 90% at 90% 0%, rgba(228,192,120,0.14), transparent 55%),
      linear-gradient(155deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border:1px solid var(--glass-brd-strong);
    border-radius:26px;padding:20px;position:relative;overflow:hidden;
  }
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .hero .date{font-size:12px;color:var(--text-2);font-weight:600;letter-spacing:.02em;}
  .hero h1{font-size:25px;font-weight:800;letter-spacing:-.03em;margin:6px 0 4px;line-height:1.08;}
  .hero .sub{font-size:13px;color:var(--muted);font-weight:500;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.02em;border:1px solid var(--glass-brd);background:var(--glass-2);}
  .chip.gold{color:var(--gold);border-color:rgba(228,192,120,.3);background:rgba(228,192,120,.08);}
  .chip.cyan{color:var(--cyan);border-color:rgba(95,198,245,.3);background:rgba(95,198,245,.08);}
  .chip.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;}
  .btn-primary{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    padding:15px;border-radius:16px;font-size:15.5px;font-weight:700;letter-spacing:.01em;
    background:linear-gradient(150deg,var(--gold),var(--gold-2));color:#181203;
    box-shadow:0 8px 26px -8px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,.25);
    margin-top:18px;transition:transform .18s var(--ease),box-shadow .2s;
  }
  .btn-primary:active{transform:scale(.975);}
  .btn-primary svg{width:18px;height:18px;}
  .btn-ghost{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:15px;font-size:14px;font-weight:650;background:var(--glass-2);border:1px solid var(--glass-brd);color:var(--text);transition:transform .15s,background .2s;}
  .btn-ghost:active{transform:scale(.98);background:var(--glass);}

  /* ============ STAT GRID ============ */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .stat{background:var(--glass);border:1px solid var(--glass-brd);border-radius:var(--radius-sm);padding:14px 14px 13px;position:relative;overflow:hidden;}
  .stat .lbl{font-size:10.5px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:5px;}
  .stat .val{font-size:26px;font-weight:750;letter-spacing:-.03em;margin-top:7px;line-height:1;font-variant-numeric:tabular-nums;}
  .stat .val small{font-size:12px;color:var(--muted);font-weight:600;margin-left:2px;letter-spacing:0;}
  .stat .foot{font-size:11px;color:var(--text-2);margin-top:6px;font-weight:500;}
  .ic{width:14px;height:14px;opacity:.85;}

  /* ============ PROGRESS BAR / RING ============ */
  .bar{height:8px;border-radius:100px;background:rgba(255,255,255,.08);overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--gold-2),var(--gold));transition:width .6s var(--ease);box-shadow:0 0 12px var(--gold-glow);}
  .bar.cyan > i{background:linear-gradient(90deg,#2f9fd6,var(--cyan));box-shadow:0 0 12px var(--cyan-glow);}
  .bar.green > i{background:linear-gradient(90deg,#25a85c,var(--green));box-shadow:0 0 12px rgba(62,212,122,.25);}

  .ring-wrap{position:relative;width:118px;height:118px;flex:none;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-wrap .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-wrap .center .big{font-size:27px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
  .ring-wrap .center .cap{font-size:9.5px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-top:4px;font-weight:600;}

  /* ============ WEEK CALENDAR ============ */
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .day{border-radius:13px;padding:9px 3px 8px;text-align:center;border:1px solid var(--glass-brd);background:var(--glass);position:relative;transition:transform .15s;}
  .day:active{transform:scale(.96);}
  .day .dow{font-size:9.5px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;font-weight:600;}
  .day .ico{font-size:15px;margin-top:5px;line-height:1;}
  .day .dt{font-size:10px;font-weight:700;margin-top:5px;}
  .day.today{border-color:rgba(228,192,120,.5);background:rgba(228,192,120,.09);box-shadow:0 0 0 1px rgba(228,192,120,.2) inset;}
  .day.today .dow{color:var(--gold);}
  .day.done::after{content:"";position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);}
  .day.strength .ico{filter:drop-shadow(0 0 6px var(--gold-glow));}
  .day.run .ico{filter:drop-shadow(0 0 6px var(--cyan-glow));}

  /* ============ EXERCISE CARD ============ */
  .ex{background:var(--glass);border:1px solid var(--glass-brd);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:border-color .3s,opacity .3s;}
  .ex.done{border-color:rgba(62,212,122,.35);}
  .ex.done .ex-head{opacity:.62;}
  .ex-head{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;}
  .ex-idx{width:30px;height:30px;flex:none;border-radius:9px;background:var(--glass-2);border:1px solid var(--glass-brd);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:750;color:var(--text-2);font-variant-numeric:tabular-nums;transition:.25s;}
  .ex.done .ex-idx{background:var(--green);border-color:var(--green);color:#04210f;}
  .ex-info{flex:1;min-width:0;}
  .ex-name{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.15;}
  .ex-meta{font-size:11.5px;color:var(--muted);margin-top:4px;font-weight:550;font-variant-numeric:tabular-nums;}
  .ex-caret{width:20px;height:20px;color:var(--faint);transition:transform .35s var(--ease);flex:none;}
  .ex.open .ex-caret{transform:rotate(180deg);}
  .ex-body{max-height:0;overflow:hidden;transition:max-height .45s var(--ease);}
  .ex.open .ex-body{max-height:900px;}
  .ex-body-in{padding:2px 16px 17px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px;}
  .tag{font-size:10px;font-weight:650;letter-spacing:.02em;padding:5px 9px;border-radius:8px;background:var(--glass-2);border:1px solid var(--glass-brd);color:var(--text-2);}
  .tag.pat{color:var(--gold);border-color:rgba(228,192,120,.25);background:rgba(228,192,120,.07);}
  .purpose{font-size:12.5px;color:var(--text-2);line-height:1.5;margin-bottom:14px;}
  .purpose b{color:var(--text);font-weight:650;}
  .specs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:15px;}
  .spec{background:rgba(255,255,255,.03);border:1px solid var(--glass-brd);border-radius:11px;padding:9px 6px;text-align:center;}
  .spec .s-l{font-size:9px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;font-weight:600;}
  .spec .s-v{font-size:14px;font-weight:750;margin-top:3px;font-variant-numeric:tabular-nums;}

  /* set pips */
  .sets-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .sets-row .sr-l{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
  .pips{display:flex;gap:8px;}
  .pip{width:34px;height:34px;border-radius:11px;border:1.5px solid var(--glass-brd-strong);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:750;color:var(--muted);transition:transform .12s var(--ease),background .2s,color .2s,border-color .2s;font-variant-numeric:tabular-nums;}
  .pip:active{transform:scale(.88);}
  .pip.on{background:linear-gradient(150deg,var(--gold),var(--gold-2));border-color:transparent;color:#181203;box-shadow:0 3px 10px -3px var(--gold-glow);}

  /* weight inputs */
  .io-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
  .io{background:rgba(255,255,255,.03);border:1px solid var(--glass-brd);border-radius:12px;padding:9px 11px;}
  .io label{font-size:9.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;font-weight:600;display:block;}
  .io .prev{font-size:11px;color:var(--faint);margin-top:2px;font-weight:600;}
  .io input{width:100%;background:none;border:none;font-size:19px;font-weight:750;color:var(--text);margin-top:2px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;outline:none;}
  .io input::placeholder{color:var(--faint);}
  textarea.notes{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--glass-brd);border-radius:12px;padding:10px 12px;font-size:13px;color:var(--text);resize:none;outline:none;min-height:44px;line-height:1.4;}
  textarea.notes::placeholder{color:var(--faint);}
  .ex-actions{display:flex;gap:9px;margin-top:13px;}
  .btn-rest{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:13px;font-size:13px;font-weight:700;background:rgba(95,198,245,.09);border:1px solid rgba(95,198,245,.25);color:var(--cyan);transition:transform .15s;}
  .btn-rest:active{transform:scale(.97);}
  .btn-done-ex{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:13px;font-size:13px;font-weight:700;background:rgba(62,212,122,.1);border:1px solid rgba(62,212,122,.28);color:var(--green);transition:transform .15s;}
  .btn-done-ex:active{transform:scale(.97);}
  .ex.done .btn-done-ex{background:var(--green);color:#04210f;}
  .btn-rest svg,.btn-done-ex svg{width:15px;height:15px;}

  /* workout sticky footer */
  .wk-bar{position:fixed;left:0;right:0;bottom:calc(76px + var(--sab));z-index:40;padding:0 18px;pointer-events:none;}
  .wk-bar-in{max-width:484px;margin:0 auto;background:rgba(16,18,22,.86);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--glass-brd-strong);border-radius:18px;padding:13px 15px;display:flex;align-items:center;gap:14px;pointer-events:auto;box-shadow:0 12px 40px -12px rgba(0,0,0,.7);}
  .wk-bar .prog{flex:1;}
  .wk-bar .prog .t{display:flex;justify-content:space-between;font-size:11px;color:var(--text-2);font-weight:600;margin-bottom:6px;}
  .wk-bar .prog .t b{color:var(--text);font-variant-numeric:tabular-nums;}
  .wk-finish{padding:12px 18px;border-radius:13px;font-size:13.5px;font-weight:750;background:linear-gradient(150deg,var(--gold),var(--gold-2));color:#181203;flex:none;transition:transform .15s;}
  .wk-finish:active{transform:scale(.96);}

  /* ============ BOTTOM NAV ============ */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;padding:0 14px calc(var(--sab) + 10px);}
  .nav-in{max-width:492px;margin:0 auto;background:rgba(13,15,18,.82);backdrop-filter:blur(28px) saturate(170%);-webkit-backdrop-filter:blur(28px) saturate(170%);border:1px solid var(--glass-brd);border-radius:24px;display:flex;justify-content:space-around;padding:9px 6px 8px;box-shadow:0 -6px 30px -14px rgba(0,0,0,.8);}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 2px;border-radius:14px;color:var(--faint);transition:color .25s,transform .15s;}
  .nav-btn:active{transform:scale(.9);}
  .nav-btn svg{width:22px;height:22px;stroke-width:1.9;}
  .nav-btn span{font-size:9.5px;font-weight:650;letter-spacing:.01em;}
  .nav-btn.active{color:var(--gold);}
  .nav-btn.active svg{filter:drop-shadow(0 0 7px var(--gold-glow));}

  /* ============ TIMER MODAL ============ */
  .modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s;}
  .modal.open{opacity:1;pointer-events:auto;}
  .sheet{width:100%;max-width:520px;background:linear-gradient(180deg,rgba(22,25,29,.98),rgba(12,14,17,.99));border:1px solid var(--glass-brd-strong);border-bottom:none;border-radius:30px 30px 0 0;padding:12px 22px calc(30px + var(--sab));transform:translateY(100%);transition:transform .42s var(--ease);}
  .modal.open .sheet{transform:none;}
  .grabber{width:38px;height:5px;border-radius:100px;background:rgba(255,255,255,.18);margin:0 auto 18px;}
  .sheet h3{font-size:17px;font-weight:750;text-align:center;letter-spacing:-.02em;}
  .timer-circle{position:relative;width:230px;height:230px;margin:18px auto 8px;}
  .timer-circle svg{transform:rotate(-90deg);}
  .timer-circle.pulse{animation:tpulse .5s var(--ease);}
  @keyframes tpulse{0%{transform:scale(1);}45%{transform:scale(1.045);}100%{transform:scale(1);}}
  .timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .timer-center .tt{font-size:52px;font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;}
  .timer-center .ts{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:8px;font-weight:600;}
  .timer-flash{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--gold);opacity:0;pointer-events:none;}
  .timer-flash.go{animation:flash .6s ease-out 3;}
  @keyframes flash{0%{opacity:.9;transform:scale(1);}100%{opacity:0;transform:scale(1.12);}}
  .presets{display:flex;gap:8px;justify-content:center;margin:14px 0 4px;flex-wrap:wrap;}
  .preset{padding:10px 15px;border-radius:13px;font-size:14px;font-weight:700;background:var(--glass-2);border:1px solid var(--glass-brd);color:var(--text-2);transition:.2s;font-variant-numeric:tabular-nums;}
  .preset.active{background:rgba(228,192,120,.12);border-color:rgba(228,192,120,.4);color:var(--gold);}
  .timer-ctrls{display:flex;gap:10px;margin-top:16px;}
  .timer-ctrls button{flex:1;padding:15px;border-radius:15px;font-size:15px;font-weight:750;transition:transform .15s;}
  .timer-ctrls button:active{transform:scale(.97);}
  .t-go{background:linear-gradient(150deg,var(--gold),var(--gold-2));color:#181203;}
  .t-reset{background:var(--glass-2);border:1px solid var(--glass-brd);color:var(--text-2);}

  /* ============ FORMS ============ */
  .field{margin-bottom:13px;}
  .field label{font-size:11px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;font-weight:600;display:block;margin-bottom:7px;}
  .field input,.field select,.field textarea{width:100%;background:var(--glass);border:1px solid var(--glass-brd);border-radius:13px;padding:13px 14px;font-size:15px;font-weight:600;color:var(--text);outline:none;transition:border-color .2s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(228,192,120,.4);}
  .field input::placeholder{color:var(--faint);}
  .seg{display:flex;gap:6px;background:var(--glass);border:1px solid var(--glass-brd);border-radius:14px;padding:4px;}
  .seg button{flex:1;padding:11px 6px;border-radius:10px;font-size:12.5px;font-weight:700;color:var(--muted);transition:.2s;}
  .seg button.on{background:var(--glass-2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .seg button.on.gold{color:var(--gold);background:rgba(228,192,120,.1);}
  .seg button.on.cyan{color:var(--cyan);background:rgba(95,198,245,.1);}

  /* macro rings */
  .macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .macro{text-align:center;}
  .macro .mr{position:relative;width:82px;height:82px;margin:0 auto;}
  .macro .mr svg{transform:rotate(-90deg);}
  .macro .mv{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}

function weekStart(){const d=new Date();const day=d.getDay();const diff=(day===0?-6:1)-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}
function weekLogs(){const ws=weekStart();return LOGS.filter(l=>new Date(l.date)>=ws);}
function weekRuns(){const ws=weekStart();return RUNS.filter(r=>new Date(r.date)>=ws);}
function weekMileage(){return weekRuns().reduce((a,r)=>a+(parseFloat(r.distance)||0),0);}

function streak(){
  if(!LOGS.length)return 0;
  const days=new Set(LOGS.map(l=>l.date.slice(0,10))); RUNS.forEach(r=>days.add(r.date.slice(0,10)));
  let s=0;const d=new Date();
  for(let i=0;i<400;i++){const k=todayKey(d);if(days.has(k)){s++;}else if(i>0){break;}d.setDate(d.getDate()-1);}
  return s;
}

function lastFor(exId){return EXLAST[exId];}

function toast(msg){const t=$("#toast");$("#toastMsg").textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}
function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||12);}catch(e){}}

function estMin(w){let sec=0;w.ex.forEach(e=>{sec+=e.sets*(35+restSec(e.rest));});return Math.round(sec/60);}
function restSec(r){const m=String(r).match(/(\d+)/);return m?parseInt(m[1]):60;}

function statCard(label,val,foot,pct,accent,inv){

  </div>`;
}
function miniStat(ico,val,lbl){
  return `<div class="stat" style="text-align:center;padding:16px 8px">
    <div style="color:var(--gold);display:flex;justify-content:center"><span style="width:20px;height:20px;display:block">${ico}</span></div>
    <div class="val" style="font-size:23px;margin-top:9px">${val}</div>
    <div class="lbl" style="justify-content:center;margin-top:4px">${lbl}</div>
  </div>`;
}

function weekCalendar(){
  const todayDow=new Date().getDay();
  const wl=weekLogs(); const wr=weekRuns();
  let html='<div class="card" style="padding:14px"><div class="week">';
  ORDER.forEach(d=>{
    const sc=SCHEDULE[d];
    const isToday=d===todayDow;
    const doneS=wl.some(l=>l.dayId===sc.day);
    const doneR=wr.some(r=>RUN_TYPES[r.type]&&sc.run===r.type);
    const done=(sc.type==="strength"&&doneS)||(sc.type==="run"&&doneR);
    const cls=[sc.type==="strength"?"strength":"run",isToday?"today":"",done?"done":""].join(" ");
    const dt=sc.type==="strength"?WORKOUTS[sc.day].tag.replace("Day ","D").split(" ")[0]:(RUN_TYPES[sc.run].target.split("–")[0]);
    html+=`<button class="day ${cls}" data-action="pick-day" data-dow="${d}">
      <div class="dow">${sc.dow}</div>
      <div class="ico">${sc.ico}</div>
      <div class="dt">${sc.type==="strength"?WORKOUTS[sc.day].tag.match(/Day \d/)?.[0]?.replace("Day ","D")||"D":dt}</div>
    </button>`;
  });
  html+='</div></div>';
  return html;
}

function nextSession(){
  const now=new Date().getDay();
  const idx=ORDER.indexOf(now);
  const nextDow=ORDER[(idx+1)%7];
  const sc=SCHEDULE[nextDow];
  if(sc.type==="strength"){const w=WORKOUTS[sc.day];return{title:w.title,sub:`${sc.dow} · ${w.ex.length} exercises`,ico:sc.ico,action:"pick-day-preview",day:sc.day};}
  const rt=RUN_TYPES[sc.run];return{title:rt.label,sub:`${sc.dow} · ${rt.target}`,ico:sc.ico,action:"go",v:"running"};
}

  return `<div class="ex ${st.done?'done':''} ${open?'open':''}" id="ex-${e.id}">

    </div>
    <div class="ex-body"><div class="ex-body-in">

        <span class="tag">${esc(e.group)}</span>
      </div>
      <div class="purpose"><b>Purpose:</b> ${esc(e.purpose)}</div>
      <div class="specs">
        <div class="spec"><div class="s-l">Sets</div><div class="s-v">${e.sets}</div></div>
        <div class="spec"><div class="s-l">Reps</div><div class="s-v" style="font-size:12.5px">${esc(e.reps)}</div></div>
        <div class="spec"><div class="s-l">Rest</div><div class="s-v" style="font-size:12px">${esc(e.rest)}</div></div>
        <div class="spec"><div class="s-l">RIR</div><div class="s-v">${esc(e.rir)}</div></div>
      </div>
      <div class="sets-row">
        <span class="sr-l">Sets done</span>
        <div class="pips">${pips}</div>
      </div>
      <div class="io-row">
        <div class="io">
          <label>Weight</label>
          <div class="prev">${last?("prev "+last.weight):(best?("best "+best.weight):"— no history")}</div>
          <input type="number" inputmode="decimal" placeholder="0" value="${st.weight}" data-action="input-weight" data-ex="${e.id}">
        </div>
        <div class="io">
          <label>Reps · RIR</label>
          <div class="prev">target ${esc(e.reps)}</div>
          <input type="text" placeholder="${esc(e.reps)}" value="${esc(st.reps)}" data-action="input-reps" data-ex="${e.id}">

        <button class="btn-rest" data-action="rest" data-rest="${restSec(e.rest)}">${I.timer} Rest ${restSec(e.rest)}s</button>
        <button class="btn-done-ex" data-action="done-ex" data-ex="${e.id}">${I.check} ${st.done?'Done':'Complete'}</button>
      </div>
    </div></div>
  </div>`;
}

function workoutProgress(){
  if(!SESSION)return 0;
  const total=SESSION.ex.length;
  const done=SESSION.ex.filter(x=>x.done).length;
  return Math.round(done/total*100);
}
function renderWkBar(){
  let bar=$("#wkBar");
  if(currentView!=="workout"){if(bar)bar.remove();return;}
  const pct=workoutProgress();
  const done=SESSION.ex.filter(x=>x.done).length;
  const total=SESSION.ex.length;
  const mins=Math.max(0,Math.round((Date.now()-SESSION.startedAt)/60000));
  if(!bar){bar=document.createElement("div");bar.className="wk-bar";bar.id="wkBar";document.body.appendChild(bar);}
  bar.innerHTML=`<div class="wk-bar-in">
    <div class="prog">
      <div class="t"><span>${done}/${total} done · ${mins} min</span><b>${pct}%</b></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
    <button class="wk-finish" data-action="finish">Finish</button>
  </div>`;
}

function finishWorkout(){
  if(!SESSION)return;
  const w=WORKOUTS[SESSION.dayId];
  const durationSec=Math.round((Date.now()-SESSION.startedAt)/1000);
  const doneEx=SESSION.ex.filter(x=>x.done||x.setsDone>0);
  const pct=workoutProgress();
  const log={
    id:"wk"+Date.now(), date:new Date().toISOString(), dayId:SESSION.dayId, dayTitle:w.title, tag:w.tag,
    durationSec, completionPct:pct,
    exercises:SESSION.ex.map(x=>{const meta=w.ex.find(e=>e.id===x.id);return{id:x.id,name:meta.name,group:meta.group,sets:meta.sets,setsDone:x.setsDone,weight:x.weight,reps:x.reps,rir:x.rir,notes:x.notes,done:x.done};})
  };
  LOGS.unshift(log);save(K.logs,LOGS);
  // update last + best
  SESSION.ex.forEach(x=>{
    if(x.weight!==""&&x.weight!=null){
      EXLAST[x.id]={weight:x.weight,reps:x.reps,rir:x.rir,date:log.date};
      const wv=parseFloat(x.weight);
      if(!isNaN(wv)&&(!BEST[x.id]||wv>parseFloat(BEST[x.id].weight))){BEST[x.id]={weight:x.weight,date:log.date};}
    }
  });
  save(K.ex,EXLAST);save(K.best,BEST);
  SESSION=null;save(K.session,null);
  const bar=$("#wkBar");if(bar)bar.remove();
  toast(`${w.tag} complete · ${Math.round(durationSec/60)} min`);
  haptic([15,40,15]);
  setView("dashboard");
}

function saveBody(){
  const metrics=["weight","bodyfat","waist","chest","arms","thighs","calves"];

  metrics.forEach(m=>{const el=$("#b_"+m);const v=el.value.trim();if(v){entry[m]=v;any=true;}});

  save(K.state,STATE);
  toast("Measurements saved");haptic();
  setView("body");
}

function sparkline(series){
  const w=300,h=44,pad=4;
  const min=Math.min(...series),max=Math.max(...series);
  const range=(max-min)||1;
  const pts=series.map((v,i)=>{
    const x=pad+i*(w-2*pad)/(series.length-1);
    const y=h-pad-((v-min)/range)*(h-2*pad);
    return[x,y];
  });
  const poly=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const lastP=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${poly}"/><circle cx="${lastP[0].toFixed(1)}" cy="${lastP[1].toFixed(1)}" r="3.5"/></svg>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);font-weight:600"><span>${min.toFixed(1)}</span><span>${max.toFixed(1)}</span></div>`;
}

/* ============================================================
   REST TIMER
============================================================ */
const Timer={sec:60,remaining:60,running:false,int:null,custom:60,
  C:ringDash(104),
  open(sec){
    if(sec){this.sec=sec;this.remaining=sec;this.setPreset(sec);}
    this.render();
    $("#timerModal").classList.add("open");
    if(sec)this.start();
  },
  close(){this.pause();$("#timerModal").classList.remove("open");},
  setPreset(sec){
    document.querySelectorAll(".preset").forEach(p=>{
      p.classList.toggle("active",p.dataset.sec==String(sec));
    });
  },
  choose(val){
    if(val==="custom"){
      const c=prompt("Custom rest (seconds):",this.custom);
      const n=parseInt(c);
      if(n&&n>0){this.custom=n;this.sec=n;this.remaining=n;document.querySelectorAll(".preset").forEach(p=>p.classList.toggle("active",p.dataset.sec==="custom"));}
    }else{
      this.sec=parseInt(val);this.remaining=this.sec;this.setPreset(this.sec);
    }
    this.pause();this.render();
  },
  start(){
    if(this.running)return;
    if(this.remaining<=0)this.remaining=this.sec;
    this.running=true;$("#timerGo").textContent="Pause";
    haptic(10);
    this.int=setInterval(()=>{
      this.remaining--;
      if(this.remaining<=0){this.finish();}
      this.render();
    },1000);
  },
  pause(){this.running=false;clearInterval(this.int);const g=$("#timerGo");if(g)g.textContent=this.remaining<this.sec&&this.remaining>0?"Resume":"Start";},
  reset(){this.pause();this.remaining=this.sec;this.render();},
  finish(){
    this.pause();this.remaining=0;
    haptic([25,60,25,60,25]);
    const c=$("#timerCircle");const f=$("#timerFlash");
    if(c){c.classList.add("pulse");setTimeout(()=>c.classList.remove("pulse"),500);}
    if(f){f.classList.add("go");setTimeout(()=>f.classList.remove("go"),1900);}
    toast("Rest complete — next set");
    setTimeout(()=>{this.remaining=this.sec;this.render();},1600);
  },
  render(){
    const t=$("#timerText");if(!t)return;
    const m=Math.floor(Math.max(0,this.remaining)/60),s=Math.max(0,this.remaining)%60;
    t.textContent=m+":"+String(s).padStart(2,"0");
    const arc=$("#timerArc");
    const frac=this.sec?Math.max(0,this.remaining)/this.sec:0;
    arc.style.strokeDashoffset=this.C*(1-frac);
    arc.style.transition="stroke-dashoffset 1s linear";
  }
};

/* ============================================================
   EVENT DELEGATION
============================================================ */
document.addEventListener("click",e=>{
  const nav=e.target.closest(".nav-btn");
  if(nav){const v=nav.dataset.nav;if(v==="more"){openMore();}else{setView(v);}haptic();return;}

  const el=e.target.closest("[data-action]");
  if(!el)return;
  const a=el.dataset.action;

  switch(a){
    case"start-workout":startSession(el.dataset.day);haptic();break;
    case"go":setView(el.dataset.v);break;
    case"more-go":$("#moreModal").classList.remove("open");setView(el.dataset.v);break;
    case"pick-day":{
      const dow=parseInt(el.dataset.dow);const sc=SCHEDULE[dow];
      if(sc.type==="strength"){startSession(sc.day);}else{runFormType=sc.run;setView("running");}
      haptic();break;
    }
    case"pick-day-preview":startSession(el.dataset.day);break;
    case"log-run-quick":runFormType=el.dataset.run;setView("running");break;
    case"toggle-ex":{
      const id=el.dataset.ex;
      SESSION.openId=SESSION.openId===id?null:id;
      save(K.session,SESSION);
      // toggle just this + close others
      document.querySelectorAll(".ex").forEach(x=>x.classList.remove("open"));
      if(SESSION.openId){const c=$("#ex-"+SESSION.openId);if(c)c.classList.add("open");}
      haptic();break;
    }
    case"pip":{
      const id=el.dataset.ex,set=parseInt(el.dataset.set);
      const st=SESSION.ex.find(x=>x.id===id);
      st.setsDone=(st.setsDone===set)?set-1:set;
      save(K.session,SESSION);
      refreshExercise(id);haptic();renderWkBar();break;
    }
    case"done-ex":{
      const id=el.dataset.ex;const st=SESSION.ex.find(x=>x.id===id);
      const meta=WORKOUTS[SESSION.dayId].ex.find(x=>x.id===id);
      st.done=!st.done;
      if(st.done&&st.setsDone===0)st.setsDone=meta.sets;
      save(K.session,SESSION);
      // auto-advance
      if(st.done){
        const list=WORKOUTS[SESSION.dayId].ex;
        const idx=list.findIndex(x=>x.id===id);
        const next=list.slice(idx+1).find(x=>!SESSION.ex.find(s=>s.id===x.id).done);
        SESSION.openId=next?next.id:null;
        save(K.session,SESSION);
        setView("workout");
        if(next){setTimeout(()=>{const c=$("#ex-"+next.id);if(c)c.scrollIntoView({behavior:"smooth",block:"center"});},120);}
      }else{refreshExercise(id);}
      haptic([12,30,12]);renderWkBar();break;
    }
    case"rest":Timer.open(parseInt(el.dataset.rest));break;
    case"finish":finishWorkout();break;
    case"save-run":saveRun();break;
    case"run-type":runFormType=el.dataset.t;setView("running");break;
    case"save-body":saveBody();break;
    case"daytype":nutOverride=el.dataset.t;setView("nutrition");break;
    case"toggle-supp":{
      const id=el.dataset.id;const dk=todayKey();
      SUPP[dk]=SUPP[dk]||{};
      SUPP[dk][id]=!SUPP[dk][id];
      if(!SUPP[dk][id])delete SUPP[dk][id];
      save(K.supp,SUPP);
      el.classList.toggle("on",!!SUPP[dk][id]);
      // update ring
      const done=SUPPS.filter(s=>SUPP[dk]&&SUPP[dk][s.id]).length;
      const ringHost=el.closest(".view").querySelector(".card .ring-wrap");
      // simplest: re-render
      renderSupplementsRing(done);
      haptic();break;
    }
    case"week-plus":STATE.currentWeek=Math.min(12,STATE.currentWeek+1);save(K.state,STATE);setView("program");haptic();break;
    case"week-minus":STATE.currentWeek=Math.max(1,STATE.currentWeek-1);save(K.state,STATE);setView("program");haptic();break;
  }
});

// timer modal controls
document.addEventListener("click",e=>{
  if(e.target.closest("#timerGo")){if(Timer.running)Timer.pause();else Timer.start();return;}
  if(e.target.closest("#timerReset")){Timer.reset();return;}
  const pre=e.target.closest(".preset");if(pre){Timer.choose(pre.dataset.sec);return;}
  // close modals on backdrop
  if(e.target.id==="timerModal"){Timer.close();}
  if(e.target.id==="moreModal"){$("#moreModal").classList.remove("open");}
});

// input handling (delegated)
document.addEventListener("input",e=>{
  const el=e.target.closest("[data-action]");if(!el||!SESSION)return;
  const id=el.dataset.ex;const st=SESSION.ex.find(x=>x.id===id);if(!st)return;
  if(el.dataset.action==="input-weight")st.weight=el.value;
  if(el.dataset.action==="input-reps")st.reps=el.value;
  if(el.dataset.action==="input-notes")st.notes=el.value;
  save(K.session,SESSION);
});

function refreshExercise(id){
  const meta=WORKOUTS[SESSION.dayId].ex.find(x=>x.id===id);
  const idx=WORKOUTS[SESSION.dayId].ex.findIndex(x=>x.id===id);
  const host=$("#ex-"+id);if(!host)return;
  const wasOpen=host.classList.contains("open");
  const tmp=document.createElement("div");tmp.innerHTML=exerciseCard(meta,idx);
  const fresh=tmp.firstElementChild;
  if(wasOpen)fresh.classList.add("open");else fresh.classList.remove("open");
  host.replaceWith(fresh);
}
function renderSupplementsRing(done){
  const host=document.querySelector(".view .ring-wrap");
  if(host){host.outerHTML=bigRing(done,SUPPS.length);}
  const countEl=document.querySelector(".view .card [style*='font-size:22px']");
  if(countEl)countEl.textContent=`${done} of ${SUPPS.length}`;
}

/* ============================================================
   AFTER RENDER (per view hooks)
============================================================ */
function afterRender(v){
  renderWkBar();
  if(v==="workout"){
    // keep only openId open
    if(SESSION&&SESSION.openId){document.querySelectorAll(".ex").forEach(x=>x.classList.toggle("open",x.id==="ex-"+SESSION.openId));}
    // live timer for elapsed
    clearInterval(window._wkInt);
    window._wkInt=setInterval(renderWkBar,15000);
  }else{clearInterval(window._wkInt);}
}

/* ============================================================
   INIT
============================================================ */
(function init(){
  // resume session prompt handled implicitly: if session exists user can go to Train
  setView("dashboard");
  Timer.render();
})();
</script>
</body>
